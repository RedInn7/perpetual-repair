<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E14"/>
      <stop offset="1" stop-color="#0E141C"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161E29"/>
      <stop offset="1" stop-color="#101822"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B7088"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#FC8181"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>

  <!-- faint grid texture -->
  <g stroke="#18222E" stroke-width="1" opacity="0.5">
    <path d="M0 0H1280M0 760H1280" />
  </g>
  <g stroke="#141C26" stroke-width="1" opacity="0.6">
    <path d="M64 0V760M1216 0V760"/>
  </g>

  <!-- title -->
  <text x="64" y="64" fill="#E6EDF3" font-size="30" font-weight="700" letter-spacing="0.5">perpetual&#8209;repair</text>
  <text x="64" y="92" fill="#5B7088" font-size="15" letter-spacing="3">SELF&#8209;HEALING ORCHESTRATION LOOP · 自修复编排闭环</text>
  <rect x="64" y="104" width="64" height="3" rx="1.5" fill="#4FD1C5"/>

  <!-- ============ TOP ROW (left -> right) ============ -->
  <!-- 1 AUDIT -->
  <g filter="url(#shadow)">
    <rect x="64" y="150" width="336" height="158" rx="16" fill="url(#card)" stroke="#22303F"/>
  </g>
  <rect x="64" y="150" width="336" height="5" rx="2.5" fill="#4FD1C5"/>
  <circle cx="96" cy="190" r="15" fill="#0E1620" stroke="#4FD1C5" stroke-width="1.5"/>
  <text x="96" y="195" fill="#4FD1C5" font-size="15" font-weight="700" text-anchor="middle">1</text>
  <text x="126" y="188" fill="#E6EDF3" font-size="20" font-weight="700">AUDIT</text>
  <text x="126" y="208" fill="#7C8FA3" font-size="13">审查 · read the whole repo</text>
  <rect x="80" y="228" width="138" height="24" rx="12" fill="#0E1620" stroke="#234"/>
  <circle cx="96" cy="240" r="4" fill="#4FD1C5"/>
  <text x="108" y="244" fill="#9FB1C4" font-size="12">1 agent</text>
  <text x="80" y="284" fill="#5B7088" font-size="12.5">→ findings&#8209;*.json</text>
  <text x="80" y="300" fill="#46586B" font-size="11.5">structured, ranked by severity</text>

  <!-- 2 PARALLEL FIX -->
  <g filter="url(#shadow)">
    <rect x="472" y="150" width="336" height="158" rx="16" fill="url(#card)" stroke="#22303F"/>
  </g>
  <rect x="472" y="150" width="336" height="5" rx="2.5" fill="#F6AD55"/>
  <circle cx="504" cy="190" r="15" fill="#0E1620" stroke="#F6AD55" stroke-width="1.5"/>
  <text x="504" y="195" fill="#F6AD55" font-size="15" font-weight="700" text-anchor="middle">2</text>
  <text x="534" y="188" fill="#E6EDF3" font-size="20" font-weight="700">PARALLEL FIX</text>
  <text x="534" y="208" fill="#7C8FA3" font-size="13">并行修复 · one worktree each</text>
  <rect x="488" y="228" width="150" height="24" rx="12" fill="#0E1620" stroke="#234"/>
  <circle cx="504" cy="240" r="4" fill="#F6AD55"/>
  <text x="516" y="244" fill="#9FB1C4" font-size="12">N agents · &#8804;max&#8209;workers</text>
  <text x="488" y="284" fill="#5B7088" font-size="12.5">isolated branch per finding</text>
  <text x="488" y="300" fill="#46586B" font-size="11.5">minimal focused diff + commit</text>

  <!-- 3 INTEGRATE -->
  <g filter="url(#shadow)">
    <rect x="880" y="150" width="336" height="158" rx="16" fill="url(#card)" stroke="#22303F"/>
  </g>
  <rect x="880" y="150" width="336" height="5" rx="2.5" fill="#B794F4"/>
  <circle cx="912" cy="190" r="15" fill="#0E1620" stroke="#B794F4" stroke-width="1.5"/>
  <text x="912" y="195" fill="#B794F4" font-size="15" font-weight="700" text-anchor="middle">3</text>
  <text x="942" y="188" fill="#E6EDF3" font-size="20" font-weight="700">INTEGRATE</text>
  <text x="942" y="208" fill="#7C8FA3" font-size="13">集成 · merge into one branch</text>
  <rect x="896" y="228" width="170" height="24" rx="12" fill="#0E1620" stroke="#234"/>
  <circle cx="912" cy="240" r="4" fill="#B794F4"/>
  <text x="924" y="244" fill="#9FB1C4" font-size="12">git merge &#8209;&#8209;no&#8209;ff</text>
  <text x="896" y="284" fill="#5B7088" font-size="12.5">conflicting fix → skip to next round</text>
  <text x="896" y="300" fill="#46586B" font-size="11.5">one conflict never breaks the round</text>

  <!-- top horizontal arrows -->
  <line x1="400" y1="229" x2="472" y2="229" stroke="#5B7088" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="808" y1="229" x2="880" y2="229" stroke="#5B7088" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- down connector (integrate -> verify) -->
  <path d="M1048 308 V374 H1048" stroke="#5B7088" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ============ BOTTOM ROW (right -> left) ============ -->
  <!-- 4 VERIFY -->
  <g filter="url(#shadow)">
    <rect x="880" y="392" width="336" height="158" rx="16" fill="url(#card)" stroke="#22303F"/>
  </g>
  <rect x="880" y="392" width="336" height="5" rx="2.5" fill="#68D391"/>
  <circle cx="912" cy="432" r="15" fill="#0E1620" stroke="#68D391" stroke-width="1.5"/>
  <text x="912" y="437" fill="#68D391" font-size="15" font-weight="700" text-anchor="middle">4</text>
  <text x="942" y="430" fill="#E6EDF3" font-size="20" font-weight="700">VERIFY + REPAIR</text>
  <text x="942" y="450" fill="#7C8FA3" font-size="13">校验维修 · build &amp; test green</text>
  <rect x="896" y="470" width="138" height="24" rx="12" fill="#0E1620" stroke="#234"/>
  <circle cx="912" cy="482" r="4" fill="#68D391"/>
  <text x="924" y="486" fill="#9FB1C4" font-size="12">1 agent</text>
  <text x="896" y="526" fill="#5B7088" font-size="12.5">fix merge&#8209;induced regressions</text>
  <text x="896" y="542" fill="#46586B" font-size="11.5">script re&#8209;checks build independently</text>

  <!-- 5 LAND -->
  <g filter="url(#shadow)">
    <rect x="472" y="392" width="336" height="158" rx="16" fill="url(#card)" stroke="#22303F"/>
  </g>
  <rect x="472" y="392" width="336" height="5" rx="2.5" fill="#63B3ED"/>
  <circle cx="504" cy="432" r="15" fill="#0E1620" stroke="#63B3ED" stroke-width="1.5"/>
  <text x="504" y="437" fill="#63B3ED" font-size="15" font-weight="700" text-anchor="middle">5</text>
  <text x="534" y="430" fill="#E6EDF3" font-size="20" font-weight="700">LAND</text>
  <text x="534" y="450" fill="#7C8FA3" font-size="13">开 PR 并合并 · open &amp; merge PR</text>
  <rect x="488" y="470" width="190" height="24" rx="12" fill="#0E1620" stroke="#234"/>
  <circle cx="504" cy="482" r="4" fill="#63B3ED"/>
  <text x="516" y="486" fill="#9FB1C4" font-size="12">gh pr create + merge &#8209;&#8209;squash</text>
  <text x="488" y="526" fill="#5B7088" font-size="12.5">&#8209;&#8209;no&#8209;land keeps it local for review</text>
  <text x="488" y="542" fill="#46586B" font-size="11.5">deletes remote branch on merge</text>

  <!-- 6 SYNC -->
  <g filter="url(#shadow)">
    <rect x="64" y="392" width="336" height="158" rx="16" fill="url(#card)" stroke="#22303F"/>
  </g>
  <rect x="64" y="392" width="336" height="5" rx="2.5" fill="#FC8181"/>
  <circle cx="96" cy="432" r="15" fill="#0E1620" stroke="#FC8181" stroke-width="1.5"/>
  <text x="96" y="437" fill="#FC8181" font-size="15" font-weight="700" text-anchor="middle">6</text>
  <text x="126" y="430" fill="#E6EDF3" font-size="20" font-weight="700">SYNC BASE</text>
  <text x="126" y="450" fill="#7C8FA3" font-size="13">更新本地 base · fast&#8209;forward</text>
  <rect x="80" y="470" width="210" height="24" rx="12" fill="#0E1620" stroke="#234"/>
  <circle cx="96" cy="482" r="4" fill="#FC8181"/>
  <text x="108" y="486" fill="#9FB1C4" font-size="12">git fetch origin base:base</text>
  <text x="80" y="526" fill="#5B7088" font-size="12.5">never checks out — your tree untouched</text>
  <text x="80" y="542" fill="#46586B" font-size="11.5">then loop / idle&#8209;sleep if dry</text>

  <!-- bottom horizontal arrows (right -> left) -->
  <line x1="880" y1="471" x2="808" y2="471" stroke="#5B7088" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="472" y1="471" x2="400" y2="471" stroke="#5B7088" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- loop back: SYNC up to AUDIT -->
  <path d="M232 392 V308" stroke="#FC8181" stroke-width="2.5" fill="none" marker-end="url(#arrowLoop)" filter="url(#glow)"/>
  <rect x="246" y="332" width="118" height="26" rx="13" fill="#1A1014" stroke="#5A2A2E"/>
  <text x="305" y="349" fill="#FC8181" font-size="12" text-anchor="middle" font-weight="600">↻ next round</text>

  <!-- isolation footer note -->
  <g opacity="0.9">
    <rect x="64" y="612" width="1152" height="84" rx="14" fill="#0D141C" stroke="#1C2733"/>
    <circle cx="96" cy="654" r="6" fill="#4FD1C5"/>
    <text x="116" y="650" fill="#9FB1C4" font-size="13" font-weight="600">Isolation&#8209;first</text>
    <text x="116" y="670" fill="#5B7088" font-size="12">every agent → own worktree + branch · all git mutations under a global lock to avoid index.lock races</text>
    <circle cx="660" cy="654" r="6" fill="#F6AD55"/>
    <text x="680" y="650" fill="#9FB1C4" font-size="13" font-weight="600">Failure&#8209;isolated</text>
    <text x="680" y="670" fill="#5B7088" font-size="12">one bad agent / conflict / failed round only drops that item — the loop keeps running</text>
    <text x="116" y="690" fill="#46586B" font-size="11.5">deps: claude (headless &#8209;p) · git · python3 · gh (for landing) · build/test cmd configurable for any language</text>
  </g>
</svg>
